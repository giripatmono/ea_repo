name: Validate Markdown

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint
        run: |
          npx --yes markdownlint-cli2 "**/*.md" "#node_modules"
